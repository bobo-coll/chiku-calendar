<style>
:root {
  --bg: #f2f2f7;
  --white: #fff;
  --text: #1c1c1e;
  --text2: #8e8e93;
  --text3: #c7c7cc;
  --border: #e5e5ea;
  --sun: #e5503a;
  --sat: #3478f6;
  --today-ring: #1c1c1e;
  --header-h: 52px;
  --filter-h: 40px;
  --bottom-h: 58px;
  --safe: env(safe-area-inset-bottom, 0px);
  /* Calendar colors */
  --cal-work:    #3478f6;
  --cal-family:  #30d158;
  --cal-personal:#ff9f0a;
  --cal-health:  #ff6b6b;
  --cal-hobby:   #bf5af2;
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 430px;
  margin: 0 auto;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* ════════ TOP BAR ════════ */
.top-bar {
  flex-shrink: 0;
  height: var(--header-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
  position: relative; z-index: 100;
}
.tb-left { display:flex; align-items:center; gap:6px; }
.tb-center { flex:1; display:flex; justify-content:center; }
.tb-right { display:flex; align-items:center; gap:6px; }
.month-nav { display:flex; align-items:center; gap:6px; }
.nav-btn {
  width:30px; height:30px; border-radius:50%;
  border:none; background:transparent; cursor:pointer;
  font-size:17px; color:var(--text2);
  display:flex; align-items:center; justify-content:center;
  transition: background .15s;
}
.nav-btn:active { background: var(--border); }
.month-label {
  font-size:18px; font-weight:800; letter-spacing:-.2px; cursor:pointer;
  min-width:120px; text-align:center;
}
.icon-btn {
  width:34px; height:34px; border-radius:50%;
  border:none; background:transparent; cursor:pointer; font-size:18px;
  display:flex; align-items:center; justify-content:center; color:var(--text);
}
.fab {
  width:34px; height:34px; border-radius:50%;
  background:var(--text); color:#fff; font-size:22px; font-weight:300;
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}

/* ════════ FILTER ROW ════════ */
.filter-row {
  flex-shrink:0; height:var(--filter-h);
  background:var(--white); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:6px;
  padding:0 0 0 10px; overflow:hidden;
  scrollbar-width:none; position:relative; z-index:99;
}
.filter-chips {
  display:flex; align-items:center; gap:6px;
  overflow-x:auto; flex:1; padding-right:6px;
  scrollbar-width:none;
}
.filter-chips::-webkit-scrollbar { display:none; }
.filter-edit-btn {
  flex-shrink:0; height:28px; padding:0 10px;
  border:none; background:transparent;
  font-size:16px; cursor:pointer; color:var(--text2);
  display:flex; align-items:center; justify-content:center;
  border-left:1px solid var(--border);
}
.filter-edit-btn:active { background:var(--bg); }
.f-chip {
  display:flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px;
  border:1.5px solid var(--border); background:var(--white);
  font-size:11px; font-weight:700; color:var(--text2);
  cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:all .15s;
}
.f-chip.on { color:var(--white); border-color:transparent; }
.f-chip .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.f-chip.on .dot { background:rgba(255,255,255,.6); }

/* ════════ SCROLL AREA ════════ */
.scroll-area {
  flex:1; overflow-y:auto; overflow-x:hidden;
  scrollbar-width:none;
  padding-bottom: calc(var(--bottom-h) + var(--safe) + 8px);
  display:flex; flex-direction:column;
}
.scroll-area::-webkit-scrollbar { display:none; }
/* 月曆和清單視圖正常 block，週曆視圖 flex fill */
#viewMonth.active, #viewList.active { display:block; flex:none; }
#viewWeek.active { flex:1; overflow:hidden; }

/* ════════ WEEKDAY HEADER ════════ */
.wd-row {
  display:grid; grid-template-columns:repeat(7,1fr);
  background:var(--white); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:50;
}
.wd {
  text-align:center; font-size:12px; font-weight:700;
  color:var(--text2); padding:5px 0; letter-spacing:.3px;
}
.wd.s { color:var(--sun); }
.wd.sa { color:var(--sat); }

/* ════════ MONTH GRID ════════ */
.month-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  background:var(--border); gap:1px;
}
.day-cell {
  background:var(--white); min-height:80px;
  padding:3px 2px 3px; cursor:pointer; overflow:hidden;
  position:relative;
  transition:background .1s;
}
.day-cell:active { background:#f5f5fa; }
.day-cell.dim-cell { background:#fafafa; }
.day-cell.dim-cell .dn, .day-cell.dim-cell .ln { color:var(--text3) !important; }
.day-cell.copy-marked-cell { background:#fff3cd; outline:2px solid #ff9f0a; outline-offset:-2px; }
.day-cell.copy-marked-cell .dn { color:#ff9f0a !important; font-weight:900; }

/* Day number */
.dn-wrap { text-align:center; margin-bottom:1px; }
.dn {
  display:inline-flex; align-items:center; justify-content:center;
  width:24px; height:24px; border-radius:50%;
  font-size:15px; font-weight:500; color:var(--text);
}
.day-cell.today-cell .dn {
  background:var(--today-ring); color:#fff; font-weight:800;
}
.day-cell.sun-cell .dn { color:var(--sun); }
.day-cell.sat-cell .dn { color:var(--sat); }
.day-cell.today-cell.sun-cell .dn,
.day-cell.today-cell.sat-cell .dn { color:#fff; }
.ln { font-size:10px; color:var(--text3); text-align:center; line-height:1.2; margin-bottom:2px; }

/* Event tags in cell */
.cell-tags { display:flex; flex-direction:column; gap:1.5px; }
.ctag {
  border-radius:3px; font-size:11px; font-weight:700;
  color:#fff; padding:1.5px 3px; line-height:15px; height:15px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ctag.timed {
  color: var(--ctag-color, #3478f6);
  background: var(--ctag-bg, rgba(52,120,246,0.13)) !important;
  font-weight:600;
}
.ctag.more { background:var(--text3); text-align:center; font-size:10px; }
/* Sticker on cell */
.cell-sticker {

<script>
// ════════ DATA ════════
let evs = JSON.parse(localStorage.getItem('cal_v4') || '[]');
const persist = () => localStorage.setItem('cal_v4', JSON.stringify(evs));

const TD = new Date();
let cur = { y: TD.getFullYear(), m: TD.getMonth() };
let selDate = toS(TD);
let editId = null;
let selCal = 'work';
let selSticker = '';
let activeFilter = 'all';
let curView = 'month';
// Week view state
let weekOffset = 0; // weeks from today's week

// ════════ HELPERS ════════
function toS(d) { return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function p2(n) { return String(n).padStart(2,'0'); }
function todS() { return toS(TD); }

const DOW = ['日','一','二','三','四','五','六'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const RL = { none:'', daily:'每天', weekly:'每週', monthly:'每月', yearly:'每年' };
// 分類設定（支援自訂，儲存於 localStorage）
const CAL_DEFAULTS = {
  work:     { icon:'💼', name:'工作',  color:'#3478f6' },
  family:   { icon:'🏠', name:'家庭',  color:'#30d158' },
  personal: { icon:'⭐', name:'個人',  color:'#ff9f0a' },
  health:   { icon:'❤️', name:'健康',  color:'#ff6b6b' },
  hobby:    { icon:'🎨', name:'興趣',  color:'#bf5af2' },
};
let calCfg = JSON.parse(localStorage.getItem('cal_cfg') || 'null') || JSON.parse(JSON.stringify(CAL_DEFAULTS));
const persistCal = () => localStorage.setItem('cal_cfg', JSON.stringify(calCfg));

// 動態生成 CAL_COLORS / CAL_NAMES（用於其他地方引用）
const CAL_COLORS = new Proxy({}, { get: (_, k) => calCfg[k]?.color || '#3478f6' });
const CAL_NAMES  = new Proxy({}, { get: (_, k) => calCfg[k]?.name || k });

function applyCal() {
  // 更新 CSS 變數
  const root = document.documentElement;
  Object.keys(calCfg).forEach(k => root.style.setProperty(`--cal-${k}`, calCfg[k].color));

  // 重建 filter 列 chips（全部 + 各分類）
  const fc = document.getElementById('filterChips');
  if (fc) {
    fc.innerHTML = `<div class="f-chip${activeFilter==='all'?' on':''}" data-cal="all" style="${activeFilter==='all'?'background:var(--text);border-color:var(--text)':''}">
      <div class="dot" style="background:${activeFilter==='all'?'rgba(255,255,255,.5)':'var(--text2)'}"></div>全部</div>`
    + Object.keys(calCfg).map(k => `<div class="f-chip${activeFilter===k?' on':''}" data-cal="${k}" style="${activeFilter===k?`background:${calCfg[k].color};border-color:${calCfg[k].color}`:''}">
      <div class="dot" style="background:${activeFilter===k?'rgba(255,255,255,.6)':calCfg[k].color}"></div>
      <span>${calCfg[k].name}</span></div>`).join('');
    fc.querySelectorAll('.f-chip').forEach(c => c.addEventListener('click', () => toggleFilter(c)));
  }

  // 重建 modal 分類選項
  const tl = document.getElementById('calTypeList');
  if (tl) {
    tl.innerHTML = Object.keys(calCfg).map(k =>
      `<div class="cal-type-opt${selCal===k?' on':''}" data-cal="${k}">
        <div class="cal-dot" style="background:${calCfg[k].color}"></div>
        <span class="cal-type-name">${calCfg[k].name}</span>
      </div>`
    ).join('');
    tl.querySelectorAll('.cal-type-opt').forEach(o => o.addEventListener('click', () => setCalType(o.dataset.cal)));
  }
}

// ════════ LUNAR ════════
const LM=['正','二','三','四','五','六','七','八','九','十','冬','臘'];
const LD=['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
function lunar(d) {
  const ref = new Date(2025,0,29);
  const diff = Math.round((d - ref) / 86400000);
  const ld = ((diff % 30) + 30) % 30;
  const lm = (Math.floor(((diff + 210) % 360) / 30) + 5) % 12;
  return ld === 0 ? LM[lm]+'月' : LD[ld];
}

// ════════ GET EVENTS ════════
function getEvs(ds) {
  const d = new Date(ds + 'T00:00:00');
  return evs.filter(e => {
    if (activeFilter !== 'all' && e.cal !== activeFilter) return false;
    const s = new Date(e.date + 'T00:00:00');
    if (d < s) return false;
    if (e.rep === 'none') {
      // 支援跨日：date <= ds <= endDate
      const end = new Date((e.endDate || e.date) + 'T00:00:00');
      return d >= s && d <= end;
    }
    if (e.rep === 'daily') return true;
    if (e.rep === 'weekly') return d.getDay() === s.getDay();
    if (e.rep === 'monthly') return d.getDate() === s.getDate();
    if (e.rep === 'yearly') return d.getDate()===s.getDate() && d.getMonth()===s.getMonth();
    return false;
  }).sort((a,b)=>(a.st||'').localeCompare(b.st||''));
}

// ════════ MONTH VIEW ════════
function renderMonth() {
  document.getElementById('mLabel').textContent = cur.y + '年 ' + MONTHS[cur.m];
  const g = document.getElementById('monthGrid');
  g.innerHTML = '';
  const first = new Date(cur.y, cur.m, 1).getDay();
  const days = new Date(cur.y, cur.m+1, 0).getDate();
  const prevDays = new Date(cur.y, cur.m, 0).getDate();

  // prev month padding
  for (let i = first-1; i >= 0; i--) {
    const dd = prevDays - i;
    const pm = cur.m===0?11:cur.m-1, py = cur.m===0?cur.y-1:cur.y;
    g.appendChild(mkCell(py+'-'+p2(pm+1)+'-'+p2(dd), dd, true));
  }
  for (let d = 1; d <= days; d++) {
    g.appendChild(mkCell(cur.y+'-'+p2(cur.m+1)+'-'+p2(d), d, false));
  }
  const filled = first + days;
  const rem = filled % 7 === 0 ? 0 : 7 - (filled % 7);
  for (let i = 1; i <= rem; i++) {
    const nm = cur.m===11?0:cur.m+1, ny = cur.m===11?cur.y+1:cur.y;
    g.appendChild(mkCell(ny+'-'+p2(nm+1)+'-'+p2(i), i, true));
  }
  renderDayPanel();
}

function mkCell(ds, n, dim) {
  const d = new Date(ds + 'T00:00:00');
  const dow = d.getDay();
  const isToday = ds === todS();
  const isSel = ds === selDate;
  const isCopyMarked = copyPendingDates.includes(ds);
  const cls = ['day-cell',
    dim ? 'dim-cell' : '',
    isToday ? 'today-cell' : '',
    isSel && !isToday ? 'sel-cell' : '',
    isCopyMarked ? 'copy-marked-cell' : '',
    dow===0 ? 'sun-cell' : '',
    dow===6 ? 'sat-cell' : ''
  ].filter(Boolean).join(' ');

  const el = document.createElement('div');
  el.className = cls;
  el.onclick = () => {
    if (copySourceId) {
      toggleCopyDate(ds);
      return;
    }
    selDate = ds;
    cur.y = d.getFullYear();
    cur.m = d.getMonth();
    renderMonth();
    renderDayPanel();
  };
  el.ondblclick = () => {
    if (copySourceId) return; // 複製模式不開彈窗
    selDate = ds; openDayPopup(ds);
  };

  const dayEvs = getEvs(ds);
  const lu = lunar(d);
  const sticker = dayEvs.find(e => e.sticker) ? dayEvs.find(e => e.sticker).sticker : '';

  let tagsHtml = dayEvs.slice(0,3).map(e => {
    const colorVar = CAL_COLORS[e.cal] || 'var(--cal-work)';
    if (e.st) {
      // 時段性：淡背景＋彩色文字
      return `<div class="ctag timed" style="--ctag-color:${colorVar};--ctag-bg:${colorVar}22">${e.st.slice(0,5)} ${e.title}</div>`;
    } else {
      // 全日：實心背景白字
      return `<div class="ctag" style="background:${colorVar}">${e.title}</div>`;
    }
  }).join('');
  if (dayEvs.length > 3) tagsHtml += `<div class="ctag more">+${dayEvs.length-3}</div>`;

  el.innerHTML = `
    <div class="dn-wrap"><div class="dn">${n}</div></div>
    <div class="ln">${lu}</div>
    <div class="cell-tags">${tagsHtml}</div>
    ${sticker ? `<div class="cell-sticker">${sticker}</div>` : ''}
  `;
  return el;
}

function renderDayPanel() {
  const panel = document.getElementById('dayPanel');
  const d = new Date(selDate + 'T00:00:00');
  const lu = lunar(d);
  const dayEvs = getEvs(selDate);

  let rows = '';
  if (!dayEvs.length) {
    rows = `<div style="padding:16px 16px 20px;font-size:13px;color:var(--text3);text-align:center">📭 這天沒有事件，點 ＋ 新增！</div>`;
  } else {
    rows = dayEvs.map(e => {
      const col = CAL_COLORS[e.cal] || 'var(--cal-work)';
      const timeStr = e.st ? (e.st + (e.en?' – '+e.en:'')) : '全天';
      const bs = [
        `<span class="badge">${timeStr}</span>`,
        `<span class="badge">${CAL_NAMES[e.cal]||''}</span>`,
        e.rep!=='none'?`<span class="badge">🔁${RL[e.rep]}</span>`:'',
        e.sticker?`<span class="badge">${e.sticker}</span>`:'',
        e.note?`<span class="badge">📝 ${e.note.slice(0,10)}</span>`:''
      ].filter(Boolean).join('');
      return `<div class="sched-ev">
        <div class="sev-bar" style="background:${col}"></div>
        <div class="sev-info">
          <div class="sev-title">${e.title}</div>

          <button class="smbtn" data-action="delete" data-id="${e.id}">🗑</button>

  panel.innerHTML = `
    <div class="dp-head">
      <div>
        <span class="dp-title">${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）</span>
        <span class="dp-lunar" style="margin-left:8px">${lu}</span>
      </div>
      <span class="dp-count">${dayEvs.length} 件</span>
    </div>

  `;
}

// ════════ WEEK VIEW ════════
function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }

function renderWeek() {
  const container = document.getElementById('weekView');
  const base = new Date(TD);
  const mon = new Date(base);
  mon.setDate(base.getDate() - ((base.getDay()+6)%7) + weekOffset*7);

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    days.push(d);
  }

  // ── 標題列 ──
  let hdr = `<div class="week-header"><div class="wh-empty" style="border-bottom:1px solid var(--border)"></div>`;
  days.forEach(d => {
    const dow = d.getDay();
    const cls = ['wh-day', toS(d)===todS()?'today-col':'', toS(d)===selDate?'sel-col':'', dow===0?'sun-col':'', dow===6?'sat-col':''].filter(Boolean).join(' ');
    hdr += `<div class="${cls}" onclick="selDate='${toS(d)}';renderDayPanel()"><div class="wh-dn">${DOW[dow]}</div><div class="wh-num">${d.getDate()}</div></div>`;
  });
  hdr += '<div class="wh-scrollbar-pad"></div></div>';

  // ── 全日事件列 ──
  let alldayRow = `<div class="allday-row"><div class="allday-label">全日</div>`;
  days.forEach(d => {
    const ds = toS(d);
    const allDayEvs = getEvs(ds).filter(e => !e.st);
    let cells = allDayEvs.map(e => {
      const col = CAL_COLORS[e.cal] || 'var(--cal-work)';
      return `<div class="allday-ev" style="background:${col}" data-action="edit" data-id="${e.id}">${e.sticker?e.sticker+' ':''}${e.title}</div>`;
    }).join('');
    alldayRow += `<div class="allday-cell">${cells}</div>`;
  });
  alldayRow += '<div class="wh-scrollbar-pad"></div></div>';

  // ── 時間軸 ──
  const HOUR_H = 52, START_H = 6, END_H = 22;
  const hours = [];
  for (let h = START_H; h <= END_H; h++) hours.push(h);

  let body = '<div class="week-body"><div class="time-col">';
  hours.forEach(h => { body += `<div class="time-slot">${h}:00</div>`; });
  body += '</div>';

  days.forEach(d => {
    const ds = toS(d);
    const timedEvs = getEvs(ds).filter(e => e.st);

    // 碰撞分組
    const cols = [];
    timedEvs.forEach(e => {
      const eStart = toMin(e.st);
      const eEnd = e.en ? toMin(e.en) : eStart + 60;
      let placed = false;
      for (let ci = 0; ci < cols.length; ci++) {
        const last = cols[ci][cols[ci].length-1];
        const lastEnd = last.en ? toMin(last.en) : toMin(last.st)+60;
        if (eStart >= lastEnd) { cols[ci].push(e); placed = true; break; }
      }
      if (!placed) cols.push([e]);
    });
    const totalCols = cols.length || 1;

    body += '<div class="day-col">';
    hours.forEach(h => { body += `<div class="week-slot" onclick="selDate='${ds}';openModal()"></div>`; });

    cols.forEach((colEvs, ci) => {
      colEvs.forEach(e => {
        const [sh, sm] = e.st.split(':').map(Number);
        const [eh, em] = e.en ? e.en.split(':').map(Number) : [sh+1, sm];
        const topPx = (sh*60+sm - START_H*60) / 60 * HOUR_H;
        const heightPx = Math.max(((eh*60+em)-(sh*60+sm)) / 60 * HOUR_H, 20);
        if (topPx < 0 || topPx > (END_H-START_H)*HOUR_H) return;
        const col = CAL_COLORS[e.cal] || 'var(--cal-work)';
        const w = 100 / totalCols;
        body += `<div class="week-ev" style="background:${col};top:${topPx}px;height:${heightPx}px;left:calc(${ci*w}% + 1px);width:calc(${w}% - 2px)" data-action="edit" data-id="${e.id}">
          <div style="font-size:8px;opacity:.85;line-height:1.2">${e.st}${e.en?'–'+e.en:''}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.sticker?e.sticker+' ':''}${e.title}</div>
        </div>`;
      });
    });
    body += '</div>';
  });
  body += '</div>';

  container.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0">
      <button onclick="weekOffset--;renderWeek()" style="border:1px solid var(--border);border-radius:8px;padding:6px 12px;background:transparent;cursor:pointer;font-size:13px">‹ 上週</button>
      <span style="font-size:13px;font-weight:700;color:var(--text2)">${days[0].getMonth()+1}/${days[0].getDate()} – ${days[6].getMonth()+1}/${days[6].getDate()}</span>
      <button onclick="weekOffset++;renderWeek()" style="border:1px solid var(--border);border-radius:8px;padding:6px 12px;background:transparent;cursor:pointer;font-size:13px">下週 ›</button>
    </div>
    ${hdr}
    ${alldayRow}
    <div class="week-scroll-container">${body}</div>
  `;
}

// ════════ SCHEDULE LIST ════════
function renderList() {
  const sv = document.getElementById('schedView');

  // 展開所有事件（過去 365 天 + 未來 180 天）
  const rangeStart = new Date(todS() + 'T00:00:00');
  rangeStart.setDate(rangeStart.getDate() - 365);
  const rangeEnd = new Date(todS() + 'T00:00:00');
  rangeEnd.setDate(rangeEnd.getDate() + 180);

  const instances = [];
  evs.forEach(e => {
    if (activeFilter !== 'all' && e.cal !== activeFilter) return;
    const start = new Date(e.date + 'T00:00:00');

    if (e.rep === 'none') {
      const d = new Date(e.date + 'T00:00:00');
      const endD = new Date((e.endDate || e.date) + 'T00:00:00');
      // 跨日事件：只在開始日期顯示一次（在範圍內即顯示）
      if (endD >= rangeStart && d <= rangeEnd) instances.push({ ...e, _ds: e.date });
      return;
    }

    // 重複事件展開
    const cur = new Date(Math.max(start, rangeStart));
    while (cur <= rangeEnd) {
      const ds = toS(cur);
      const d = new Date(ds + 'T00:00:00');
      let match = false;
      if (e.rep === 'daily') match = true;
      else if (e.rep === 'weekly')  match = d.getDay() === start.getDay();
      else if (e.rep === 'monthly') match = d.getDate() === start.getDate();
      else if (e.rep === 'yearly')  match = d.getDate() === start.getDate() && d.getMonth() === start.getMonth();
      if (match) instances.push({ ...e, _ds: ds });
      cur.setDate(cur.getDate() + 1);
    }
  });

  instances.sort((a, b) => {
    const dc = a._ds.localeCompare(b._ds);
    return dc !== 0 ? dc : (a.st || '').localeCompare(b.st || '');
  });

  if (!instances.length) {
    sv.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);font-size:14px">還沒有事件<br><br>點右上角 ＋ 新增第一個事件！</div>';
    return;
  }

  let lastM = '', lastD = '', html = '';
  instances.forEach(e => {
    const d = new Date(e._ds + 'T00:00:00');
    const mk = `${d.getFullYear()}年${d.getMonth()+1}月`;
    if (mk !== lastM) { html += `<div class="sched-month">${mk}</div>`; lastM = mk; }
    if (e._ds !== lastD) {
      const dow = d.getDay();
      const dc = dow===0?'s':dow===6?'sa':'';
      const isToday = e._ds === todS();
      html += `<div class="sched-day-hd"${isToday?' data-today':''}>
        <span class="sched-day-num ${dc}">${d.getDate()}</span>
        <span class="sched-day-dow">${DOW[dow]}</span>
        <span class="sched-day-lunar">${lunar(d)}</span>
        ${isToday ? '<span style="font-size:11px;font-weight:800;color:#fff;background:var(--text);border-radius:6px;padding:1px 6px;margin-left:4px">今天</span>' : ''}
      </div>`;
      lastD = e._ds;
    }
    const col = CAL_COLORS[e.cal] || 'var(--cal-work)';
    const isMultiDay = e.endDate && e.endDate !== e.date;
    const timeStr = e.st
      ? (e.st + (e.en?' – '+e.en:'')) + (isMultiDay ? ` (至${e.endDate.slice(5).replace('-','/')})` : '')
      : (isMultiDay ? `全天 ${e.date.slice(5).replace('-','/')} – ${e.endDate.slice(5).replace('-','/')}` : '全天');
    html += `<div class="sched-ev">
      <div class="sev-bar" style="background:${col}"></div>
      <div class="sev-info">
        <div class="sev-title">${e.sticker?e.sticker+' ':''}${e.title}</div>
        <div class="sev-meta">
          <span class="badge">${timeStr}</span>
          <span class="badge">${CAL_NAMES[e.cal]||''}</span>
          ${e.rep!=='none'?`<span class="badge">🔁${RL[e.rep]}</span>`:''}
          ${e.note?`<span class="badge">📝</span>`:''}
        </div>
      </div>
      <div class="sev-acts">
        <button class="smbtn" data-action="edit" data-id="${e.id}">✏️</button>
        <button class="smbtn" data-action="delete" data-id="${e.id}">🗑</button>
      </div>
    </div>`;
  });
  sv.innerHTML = html;

  // 捲動到今天
  setTimeout(() => {
    const todayEl = sv.querySelector('[data-today]');
    if (todayEl) todayEl.scrollIntoView({ block: 'start', behavior: 'smooth' });
  }, 50);
}

// ════════ NAVIGATION ════════
function chM(d) {
  cur.m += d;
  if (cur.m < 0) { cur.m = 11; cur.y--; }
  if (cur.m > 11) { cur.m = 0; cur.y++; }
  renderMonth();
}
function goToday() {
  cur.y = TD.getFullYear(); cur.m = TD.getMonth();
  selDate = todS(); weekOffset = 0;
  renderAll();
}
function renderAll() {
  if (curView === 'month') renderMonth();
  else if (curView === 'week') renderWeek();
  else if (curView === 'list') renderList();
}

function switchView(v, btn) {
  curView = v;
  document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  if (v === 'month') { document.getElementById('viewMonth').classList.add('active'); renderMonth(); }
  else if (v === 'week') { document.getElementById('viewWeek').classList.add('active'); renderWeek(); }
  else if (v === 'list') { document.getElementById('viewList').classList.add('active'); renderList(); }
  else { document.getElementById('viewMonth').classList.add('active'); renderMonth(); }
}

// ════════ FILTER ════════
function toggleFilter(el) {
  const cal = el.dataset.cal;
  activeFilter = cal;
  document.querySelectorAll('.f-chip').forEach(c => {
    const isOn = c.dataset.cal === cal;
    c.classList.toggle('on', isOn);
    if (isOn) {
      if (cal === 'all') { c.style.background = 'var(--text)'; c.style.borderColor = 'var(--text)'; }
      else { c.style.background = CAL_COLORS[cal]||'var(--text)'; c.style.borderColor = CAL_COLORS[cal]||'var(--text)'; }
    } else { c.style.background = ''; c.style.borderColor = ''; }
  });
  renderAll();
}

// ════════ 分類編輯器 ════════
const CAL_PALETTE = ['#3478f6','#30d158','#ff9f0a','#ff6b6b','#bf5af2','#ff375f','#5ac8fa','#34c759','#ff9500','#af52de','#00c7be','#636366'];

let editingCal = null;
let editorSelColor = '';
let calCfgDraft = {}; // 暫存草稿，按儲存才寫入

function openCalEditor(key) {
  // 開啟時複製一份 draft
  calCfgDraft = JSON.parse(JSON.stringify(calCfg));
  document.getElementById('calEditorMask').classList.add('open');
  fillCalEditor(key);
}

function saveDraftCurrent() {
  // 將目前欄位值存入 draft（僅在最終儲存前呼叫）
  if (!editingCal || !calCfgDraft[editingCal]) return;
  const n = document.getElementById('calNameInput').value.trim();
  calCfgDraft[editingCal].name = n || calCfgDraft[editingCal].name;
  calCfgDraft[editingCal].color = editorSelColor;
}

function fillCalEditor(key) {
  if (!calCfgDraft[key]) key = Object.keys(calCfgDraft)[0];
  editingCal = key;
  const cfg = calCfgDraft[key];
  editorSelColor = cfg.color;

  // 左側分類清單
  const list = document.getElementById('calEditorList');
  list.innerHTML = Object.keys(calCfgDraft).map(k => {
    const c = calCfgDraft[k];
    return `<button class="cal-list-item${k===key?' on':''}" data-calkey="${k}">
      <span class="cal-list-dot" style="background:${c.color}"></span>${c.name}
    </button>`;
  }).join('');
  list.querySelectorAll('.cal-list-item').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.calkey !== editingCal) {
        fillCalEditor(btn.dataset.calkey);
      }
    });
  });

  // 新增按鈕上限提示
  const addBtn = document.getElementById('addCalBtn');
  const atLimit = Object.keys(calCfgDraft).length >= 10;
  addBtn.disabled = atLimit;
  addBtn.textContent = atLimit ? '已達上限（10個）' : '＋ 新增分類';
  addBtn.style.opacity = atLimit ? '0.4' : '1';
  addBtn.style.cursor = atLimit ? 'not-allowed' : 'pointer';

  const nameInp = document.getElementById('calNameInput');
  nameInp.value = cfg.name;
  nameInp.oninput = () => {};

  // 刪除按鈕
  const delBtn = document.getElementById('calDelBtn');
  delBtn.style.display = Object.keys(calCfgDraft).length > 1 ? 'block' : 'none';
  delBtn.onclick = () => deleteCalCategory(editingCal);

  // 顏色格
  const row = document.getElementById('calColorRow');
  row.innerHTML = CAL_PALETTE.map(c =>
    `<div class="cal-color-opt${c===editorSelColor?' on':''}" data-color="${c}" style="background:${c}"></div>`
  ).join('');
  row.querySelectorAll('.cal-color-opt').forEach(el => {
    el.addEventListener('click', () => {
      editorSelColor = el.dataset.color;
      row.querySelectorAll('.cal-color-opt').forEach(x => x.classList.remove('on'));
      el.classList.add('on');
      document.getElementById('calColorPicker').value = editorSelColor;
    });
  });

  // 調色盤
  const picker = document.getElementById('calColorPicker');
  picker.value = editorSelColor;
  picker.oninput = null;
  picker.oninput = () => {
    editorSelColor = picker.value;
    row.querySelectorAll('.cal-color-opt').forEach(x => x.classList.remove('on'));
  };
}

function addCalCategory() {
  if (Object.keys(calCfgDraft).length >= 10) { toast('分類最多10個'); return; }
  const newKey = 'cat_' + Date.now();
  const colors = ['#3478f6','#30d158','#ff9f0a','#ff6b6b','#bf5af2','#ff375f','#5ac8fa'];
  const usedColors = Object.values(calCfgDraft).map(c => c.color);
  const color = colors.find(c => !usedColors.includes(c)) || colors[Math.floor(Math.random()*colors.length)];
  calCfgDraft[newKey] = { icon:'', name:'新分類', color };
  fillCalEditor(newKey);
  const inp = document.getElementById('calNameInput');
  inp.focus(); inp.select();
}

function deleteCalCategory(key) {
  if (Object.keys(calCfgDraft).length <= 1) { toast('至少保留一個分類'); return; }
  const fallback = Object.keys(calCfgDraft).find(k => k !== key);
  delete calCfgDraft[key];
  fillCalEditor(fallback);
}

function closeCalEditor() {
  document.getElementById('calEditorMask').classList.remove('open');
  editingCal = null;
  calCfgDraft = {};
}

function saveCalEditor() {
  saveDraftCurrent(); // 先存目前欄位到 draft
  // 把 draft 中被刪除的分類，將其事件移到第一個存在的分類
  const draftKeys = Object.keys(calCfgDraft);
  evs.forEach(e => { if (!calCfgDraft[e.cal]) e.cal = draftKeys[0]; });
  persist();
  calCfg = calCfgDraft;
  persistCal();
  applyCal();
  // 確認 selCal 仍有效
  if (!calCfg[selCal]) selCal = Object.keys(calCfg)[0];
  document.getElementById('calEditorMask').classList.remove('open');
  editingCal = null;
  calCfgDraft = {};
  renderMonth();
  if (curView === 'list') renderList();
  if (curView === 'week') renderWeek();
  toast('✅ 分類已儲存');
}

document.getElementById('calEditorMask').addEventListener('click', function(e) {
  if (e.target === this) closeCalEditor();

document.querySelector('.cal-editor-sheet').addEventListener('click', function(e) {

function saveEvent() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('請輸入標題！'); return; }
  const date = document.getElementById('fDate').value;
  if (!date) { toast('請選擇日期！'); return; }

  const isAllDay = document.getElementById('fAllDay').checked;
  const rawEndDate = document.getElementById('fEndDate').value;
  const endDate = (rawEndDate && rawEndDate >= date) ? rawEndDate : date;

  const ev = {
    id: editId || Date.now().toString(),
    title, date,
    endDate,
    st: document.getElementById('fStart').value,
    en: document.getElementById('fEnd').value,
    cal: selCal,
    rep: document.getElementById('fRepeat').value,
    rm: document.getElementById('fRemind').value,
    note: document.getElementById('fNote').value.trim(),
    sticker: selSticker
  };

  if (editId) { const i = evs.findIndex(x => x.id === editId); evs[i] = ev; toast('✅ 已更新！'); }
  else { evs.push(ev); toast('✅ 已新增！'); }

  persist();
  selDate = date;
  cur.y = parseInt(date.split('-')[0]);
  cur.m = parseInt(date.split('-')[1]) - 1;
  renderAll();
  schedRem();

  // 關閉編輯 modal
  document.getElementById('overlay').classList.remove('open');
  editId = null;

  // 如果是從日視窗進來的，重新開啟日視窗顯示更新後的行程
  if (currentPopupDs) {
    openDayPopup(currentPopupDs);
  }
}

// ⚠️  請將下方 YOUR_CLIENT_ID 換成你在 Google Cloud Console 申請的 OAuth 2.0 Client ID
const GCAL_CLIENT_ID = 'YOUR_CLIENT_ID';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';

function connectGoogleCalendar() {
  if (GCAL_CLIENT_ID === 'YOUR_CLIENT_ID') {
    toast('⚠️ 請先填入 Google Client ID');
    return;
  }
  const params = new URLSearchParams({
    client_id: GCAL_CLIENT_ID,
    redirect_uri: location.origin + location.pathname,
    response_type: 'token',
    scope: GCAL_SCOPE,
    prompt: 'select_account',
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
}

function disconnectGoogleCalendar() {
  localStorage.removeItem('gcal_token');
  localStorage.removeItem('gcal_user');
  refreshGcalUI();
  toast('已斷開 Google 日曆連結');
}

function refreshGcalUI() {
  const user = JSON.parse(localStorage.getItem('gcal_user') || 'null');
  const dis = document.getElementById('gcal-disconnected');
  const con = document.getElementById('gcal-connected');
  if (user) {
    document.getElementById('gcal-name').textContent  = user.name  || '';
    document.getElementById('gcal-email').textContent = user.email || '';
    // 頭像：有圖片用圖片，否則用名字首字
    const av = document.getElementById('gcal-avatar');
    if (user.picture) {
      av.innerHTML = `<img src="${user.picture}" style="width:36px;height:36px;border-radius:50%;object-fit:cover">`;
    } else {
      av.textContent = (user.name || 'G')[0].toUpperCase();
    }
    dis.style.display = 'none';
    con.style.display = '';
  } else {
    dis.style.display = '';
    con.style.display = 'none';
  }
}

// OAuth 回調：解析 URL hash 中的 access_token
(function handleOAuthCallback() {
  const hash = location.hash;
  if (!hash.includes('access_token')) return;
  const params = new URLSearchParams(hash.slice(1));
  const token = params.get('access_token');
  if (!token) return;
  history.replaceState(null, '', location.pathname); // 清除 hash
  localStorage.setItem('gcal_token', token);
  // 取得使用者資訊
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + token }
  })
  .then(r => r.json())
  .then(info => {
    localStorage.setItem('gcal_user', JSON.stringify({
      name:    info.name,
      email:   info.email,
      picture: info.picture,
    }));
    openSettingsModal();
    toast('✅ 已連結 ' + info.email);
  })
  .catch(() => toast('⚠️ 無法取得帳號資訊'));
})();

function setupConfirmDialog() {
  document.getElementById('confirmOk').addEventListener('click', () => {
    document.getElementById('confirmMask').classList.remove('open');
    if (!pendingDeleteId) return;
    const id = pendingDeleteId;
    pendingDeleteId = null;
    doDelete(id);
  });
  document.getElementById('confirmCancel').addEventListener('click', () => {
    document.getElementById('confirmMask').classList.remove('open');
    pendingDeleteId = null;
  });
}

function doDelete(id) {
  evs = evs.filter(e => e.id !== id);
  persist();
  toast('🗑 已刪除');
  renderMonth();
  renderDayPanel();
  if (curView === 'list') renderList();
  if (curView === 'week') renderWeek();
  if (currentPopupDs) {
    renderDayPopupContent(currentPopupDs);
    if (!getEvs(currentPopupDs).length) closeDayPopup();
  }
}

function deleteEvent(id) {
  const ev = evs.find(e => e.id === id);
  const title = ev ? ev.title : '此行程';
  showConfirm(id, title);
}

const delEv = deleteEvent;
const delEvAndRefresh = deleteEvent;
const delEvFromList = deleteEvent;

// ════════ 複製模式 ════════
let copySourceId = null;
let copyPendingDates = []; // 要貼上的日期清單

function startCopyMode(id) {
  copySourceId = id;
  copyPendingDates = [];
  const banner = document.getElementById('copyBanner');
  banner.style.display = 'flex';
  document.getElementById('copyCount').textContent = '0';
  // 關閉日視窗，回到月曆
  closeDayPopup();
  switchView('month', document.getElementById('bn-month'));
  toast('📋 點選日期格子貼上，完成後按儲存');
}

function toggleCopyDate(ds) {
  const idx = copyPendingDates.indexOf(ds);
  if (idx >= 0) {
    copyPendingDates.splice(idx, 1); // 取消貼上
  } else {
    copyPendingDates.push(ds); // 加入貼上
  }
  document.getElementById('copyCount').textContent = copyPendingDates.length;
  renderMonth(); // 重繪格子顯示標記
}

function saveCopyMode() {
  if (!copySourceId) { cancelCopyMode(); return; }
  if (!copyPendingDates.length) { toast('請先點選要貼上的日期'); return; }
  const src = evs.find(e => e.id === copySourceId);
  if (!src) { cancelCopyMode(); return; }
  const n = copyPendingDates.length;
  copyPendingDates.forEach(ds => {
    evs.push({ ...src, id: Date.now().toString() + Math.random().toString(36).slice(2), date: ds, endDate: ds });
  });
  persist();
  const saved = n;
  cancelCopyMode();
  renderAll();
  toast(`✅ 已複製到 ${saved} 個日期`);
}

function cancelCopyMode() {
  copySourceId = null;
  copyPendingDates = [];
  document.getElementById('copyBanner').style.display = 'none';
  renderMonth();
}

// ════════ 全域事件委派（掛在 document，永久有效）════════
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = (btn.dataset.id || '').trim();
  if (!id) return;
  if (action === 'edit')   { openModal(id); }
  if (action === 'delete') { deleteEvent(id); }
  if (action === 'copy')   { startCopyMode(id); }
});

function toggleAllDay(isAllDay) {
  const timeRow = document.getElementById('timeRow');
  if (isAllDay) {
    timeRow.style.display = 'none';
    document.getElementById('fStart').value = '';
    document.getElementById('fEnd').value = '';

    timeRow.style.display = '';
  }
}

function showSearch() { toast('🔍 搜尋功能即將推出'); }

// ════════ REMINDERS ════════
function schedRem() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') Notification.requestPermission();
  const now = new Date();
  evs.forEach(e => {
    if (e.rm === 'none' || !e.st) return;
    const dt = new Date(e.date + 'T' + e.st + ':00');
    const rd = new Date(dt - parseInt(e.rm) * 60000);
    const diff = rd - now;
    if (diff > 0 && diff < 86400000) {
      setTimeout(() => {
        if (Notification.permission === 'granted')
          new Notification('📅 ' + e.title, { body: (e.sticker?e.sticker+' ':'') + e.st + ' 的行程即將開始' });
      }, diff);
    }
  });
}

// ════════ DAY POPUP ════════
let currentPopupDs = '';

function openDayPopup(ds) {
  selDate = ds;
  currentPopupDs = ds;
  const d = new Date(ds + 'T00:00:00');
  const lu = lunar(d);
  const dow = d.getDay();
  const dowNames = ['日','一','二','三','四','五','六'];

  document.getElementById('dpDateBig').textContent =
    `${d.getMonth()+1}月${d.getDate()}日（${dowNames[dow]}）`;
  document.getElementById('dpDateSub').textContent =
    `農曆 ${lu}　• ${d.getFullYear()}年`;

  renderDayPopupContent(ds);
  document.getElementById('dayOverlay').classList.add('open');
}

function renderDayPopupContent(ds) {
  const dayEvs = getEvs(ds);
  const scroll = document.getElementById('dpScroll');

  if (!dayEvs.length) {
    scroll.innerHTML = `<div class="dp-no-ev">📭 這天還沒有行程<br><span style="font-size:12px">點上方「＋ 新增」加入事件</span></div>`;
    return;
  }

  scroll.innerHTML = dayEvs.map(e => {
    const col = CAL_COLORS[e.cal] || 'var(--cal-work)';
    const timeStr = e.st ? (e.st + (e.en ? ' – ' + e.en : '')) : '全天';
    const badges = [
      `<span class="dp-badge">${CAL_NAMES[e.cal]||''}</span>`,
      e.rep !== 'none' ? `<span class="dp-badge">🔁 ${RL[e.rep]}</span>` : '',
      e.rm !== 'none' ? `<span class="dp-badge">🔔 提醒</span>` : '',
    ].filter(Boolean).join('');
    return `<div class="dp-ev-item" data-id="${e.id}">
      <div class="dp-ev-bar" style="background:${col}"></div>
      <div class="dp-ev-body">
        <div class="dp-ev-title">${e.sticker ? e.sticker + ' ' : ''}${e.title}</div>
        <div class="dp-ev-time">🕐 ${timeStr}</div>
        ${e.note ? `<div class="dp-ev-note">📝 ${e.note}</div>` : ''}
        <div class="dp-ev-badges">${badges}</div>
      </div>
      <div class="dp-ev-acts">
        <button class="dp-btn" data-action="copy" data-id="${e.id}">📋</button>
        <button class="dp-btn" data-action="edit" data-id="${e.id}">✏️</button>
        <button class="dp-btn" data-action="delete" data-id="${e.id}">🗑</button>
      </div>
    </div>`;
  }).join('');

}

function editFromPopup(id) {
  // 直接開啟編輯 modal，疊在日視窗上面（z-index: 500 > 400）
  openModal(id);
}

function openModalFromPopup() {

function closeDayPopup() {
  document.getElementById('dayOverlay').classList.remove('open');

}

function setupOverlayClose() {

// ════════ TOAST ════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
